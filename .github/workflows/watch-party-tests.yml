name: Run Watch-Party Tests
on:
  push:
    paths:
      - 'watch-party/**'
      - '.github/workflows/watch-party-tests.yml'
  pull_request:
    paths:
      - 'watch-party/**'
      - '.github/workflows/watch-party-tests.yml'

jobs:
  watch-party-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Run watch-party tests
        working-directory: watch-party
        run: ./mvnw clean test
