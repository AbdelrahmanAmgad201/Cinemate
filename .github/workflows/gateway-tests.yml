name: Run Gateway Tests
on:
  push:
    paths:
      - 'gateway/**'
      - '.github/workflows/gateway-tests.yml'
  pull_request:
    paths:
      - 'gateway/**'
      - '.github/workflows/gateway-tests.yml'

jobs:
  gateway-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Run gateway tests
        working-directory: gateway
        run: ./mvnw clean test
