server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Docker's embedded DNS. Needed so /ws below resolves "watch-party" lazily, per
    # request, instead of once at nginx startup — a plain `proxy_pass http://watch-party..`
    # would otherwise fail to start nginx at all if that container isn't up yet, and
    # would keep proxying to a stale IP if watch-party is ever restarted.
    resolver 127.0.0.11 valid=10s;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/json application/xml+rss;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    # X-XSS-Protection removed (FE-06) — deprecated, ignored by modern browsers
    # (Chrome 78+), provided false security assurance.

    # Content-Security-Policy (FE-06). script-src/style-src/img-src are the actual
    # XSS mitigation here (block inline/injected <script> tags and externally-hosted
    # payloads regardless of what SEC-NEW-05-style rendering gaps exist elsewhere).
    # connect-src/ws-src are left open to http/https/ws/wss rather than 'self'
    # because the backend and watch-party origins are runtime-configurable
    # (window.__CINEMATE_CONFIG__, see FE-02) and not known at nginx-config time —
    # restricting to 'self' here would break any deployment where the API isn't
    # served from the same origin as this frontend (the default local Docker Compose
    # setup included, where the backend is on a different port).
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self' http: https: ws: wss:; frame-ancestors 'self';" always;

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Proxy the watch-party WebSocket (FE-03) — watch-party is internal-only
    # (compose.yaml `expose`, not `ports`), so the browser can't connect to it
    # directly; it has to go through this same-origin proxy instead.
    location /ws {
        set $watchparty_upstream http://watch-party:8081;
        proxy_pass $watchparty_upstream/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400s;
    }

    # React Router - serve index.html for all routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Health check endpoint
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
}