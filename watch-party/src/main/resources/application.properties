spring.application.name=watch-party
server.port=8081

# Graceful shutdown (REL-NEW-02) — without this, a SIGTERM (container stop, rolling
# deploy) drops active WebSocket sessions immediately with no notice, and any Redis
# write in flight is left exactly as-is. Gives in-flight requests/sessions up to 20s
# to finish before the JVM exits.
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=20s

# Redis Single Instance Configuration
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.timeout=5000ms

# Lettuce Pool Configuration
spring.data.redis.lettuce.pool.max-active=8
spring.data.redis.lettuce.pool.max-idle=8
spring.data.redis.lettuce.pool.min-idle=2
spring.data.redis.lettuce.pool.max-wait=-1ms

# Cache Configuration
spring.cache.type=redis
spring.cache.redis.time-to-live=600000
spring.cache.redis.cache-null-values=false

# Logging
logging.level.org.example.watchparty=INFO
logging.level.org.springframework.data.redis=INFO

# Internal API key — must match the WATCHPARTY_KEY env var in the backend.
# Leave blank only for local dev without a configured key — InternalApiKeyFilter fails
# CLOSED (503) when unset, not open (SEC-08).
internal.api.key=${WATCHPARTY_KEY:}

# Comma-separated origins allowed to open the /ws WebSocket (SEC-NEW-02).
# Same value/format as the backend's CORS_ALLOWED_ORIGINS.
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}