spring.application.name=watch-party
server.port=8081

# Graceful shutdown (REL-NEW-02) — without this, a SIGTERM (container stop, rolling
# deploy) drops active WebSocket sessions immediately with no notice, and any Redis
# write in flight is left exactly as-is. Gives in-flight requests/sessions up to 20s
# to finish before the JVM exits.
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=20s

# Redis Single Instance Configuration
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.timeout=5000ms

# Lettuce Pool Configuration
spring.data.redis.lettuce.pool.max-active=8
spring.data.redis.lettuce.pool.max-idle=8
spring.data.redis.lettuce.pool.min-idle=2
spring.data.redis.lettuce.pool.max-wait=-1ms

# Cache Configuration
spring.cache.type=redis
spring.cache.redis.time-to-live=600000
spring.cache.redis.cache-null-values=false

# Logging
logging.level.org.example.watchparty=INFO
logging.level.org.springframework.data.redis=INFO

# Backend base URL — the service calls the backend's public movie API (read-only) to
# resolve a movie's playable URL at party-create time (Stage 1). Not a startup
# dependency: the call is lazy, so the backend being down only fails a create.
backend.url=${BACKEND_URL:http://localhost:8080}

# Comma-separated origins allowed to open the /ws WebSocket (SEC-NEW-02).
# Same value/format as the backend's CORS_ALLOWED_ORIGINS.
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}

# Public half of the RS256 keypair — verifies the access token carried on the STOMP
# CONNECT frame (REL-08). Same key the gateway/backend use. Fail-closed: with no key
# the JwtDecoder bean can't be built and the service won't start, rather than booting
# with WebSocket authentication silently off.
jwt.public-key=${JWT_PUBLIC_KEY:}