# ===============================
# Application
# ===============================
spring.application.name=backend-test
BASE_URL=http://localhost

# ===============================
# JPA + Flyway (PostgreSQL via Testcontainers — see AbstractPostgresIntegrationTest)
# ===============================
# spring.datasource.* is supplied dynamically by AbstractPostgresIntegrationTest at
# context startup, pointed at a real postgres:16 container (matches compose.yaml).
# Flyway builds the schema from the same migrations production uses, so tests catch
# entity/schema drift; Hibernate only validates.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.flyway.enabled=true

# ===============================
# External services (mocked values)
# ===============================
sendgrid.api.key=test-key
sendgrid.from.email=test@example.com

# ===============================
# Moderation pipeline (Kafka) — no broker in tests
# ===============================
# A bootstrap value is required for the context to build, but nothing connects:
# the listener container is not auto-started and the outbox relay is pushed far out,
# so no test attempts a real Kafka connection. Services under test collaborate with a
# mocked ModerationOutboxService / TransactionOperations instead.
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.listener.auto-startup=false
moderation.topics.requests=moderation.requests
moderation.topics.verdicts=moderation.verdicts
moderation.topics.dlq=moderation.requests.dlq
moderation.topics.verdicts-dlq=moderation.verdicts.dlq
moderation.outbox.relay-initial-delay-ms=3600000
moderation.outbox.relay-delay-ms=3600000

# ===============================
# Security
# ===============================
# Throwaway RS256 keypair for tests only (never used outside the test profile).
jwt.private-
jwt.public-
jwt.access-token-expiration-ms=900000
jwt.refresh-token-expiration-ms=604800000
app.cookie.secure=false
app.cookie.same-site=Lax

spring.security.oauth2.client.registration.google.client-id=test-client-id
spring.security.oauth2.client.registration.google.client-secret=test-client-secret


# ===============================
# Noise reduction
# ===============================
logging.level.org.hibernate=ERROR
logging.level.org.flywaydb=WARN
logging.level.org.testcontainers=INFO
