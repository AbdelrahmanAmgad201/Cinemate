spring.application.name=${SPRING_APPLICATION_NAME:Cinemate}

# ─── MySQL ────────────────────────────────────────────────────────────────────
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:validate}
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.main.allow-bean-definition-overriding=true

# HikariCP tuning (PERF-NEW-01) — Spring Boot's default of 10 connections is
# undersized for a service that also talks to MongoDB and two other HTTP services
# concurrently on the same request in places.
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=10000

# ─── MongoDB ──────────────────────────────────────────────────────────────────
spring.data.mongodb.uri=${MONGODB_URI}

# ─── Redis (response cache + JWT revocation list — ARC-06) ───────────────────
# Dedicated cache instance, deliberately separate from watch-party's Redis —
# see the `redis` vs `redis-cache` comments in compose.yaml.
spring.data.redis.host=${REDIS_CACHE_HOST:localhost}
spring.data.redis.port=${REDIS_CACHE_PORT:6379}
spring.data.redis.timeout=2000ms
spring.data.redis.connect-timeout=2000ms

# ─── External Services ────────────────────────────────────────────────────────
sendgrid.api.key=${SENDGRID_API_KEY}
sendgrid.from.email=${SENDGRID_FROM_EMAIL}

hatespeech.model.url=${HATE_MODEL_URL:http://hate-api:8000/api/hate/v1/analyze}
hatespeech.api.key=${HATE_API_KEY:}

# ─── Auth ─────────────────────────────────────────────────────────────────────
jwt.secret=${JWT_SECRET}

# ─── Google OAuth2 ────────────────────────────────────────────────────────────
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=profile,email
# BASE_URL = public URL of the backend (e.g. https://api.cinemate.example.com)
spring.security.oauth2.client.registration.google.redirect-uri=${BASE_URL}/login/oauth2/code/{registrationId}

# ─── Watch-Party Microservice ─────────────────────────────────────────────────
watchparty.service.url=${WATCHPARTY_SERVICE_URL:http://watch-party:8081}
watchparty.websocket.url=${WATCHPARTY_WS_URL:ws://watch-party:8081/ws}
watchparty.service.internal.api.key=${WATCHPARTY_KEY}

# ─── Frontend / CORS ──────────────────────────────────────────────────────────
# Public URL of the frontend — used for the Google OAuth redirect target.
# Example: http://localhost:5173  or  https://cinemate.example.com
app.frontend.url=${FRONTEND_URL:http://localhost:5173}

# Comma-separated list of origins that are allowed to call the backend via CORS.
# Example: http://localhost:5173,https://cinemate.example.com
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}

# ─── Profile ──────────────────────────────────────────────────────────────────
# Override with SPRING_PROFILES_ACTIVE env var in production (set to 'prod').
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}
