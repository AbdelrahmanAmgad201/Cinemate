spring.application.name=${SPRING_APPLICATION_NAME:Cinemate}

# ─── PostgreSQL (single datastore for all application data) ───────────────────
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# Flyway owns the schema (V*__*.sql under db/migration); Hibernate only validates
# the entities against it. Never let Hibernate alter the schema.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.flyway.enabled=true

# HikariCP tuning (PERF-NEW-01). One datasource now carries the whole workload that
# was previously split across MySQL + MongoDB, so keep the pool generous.
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=10000

# ─── External Services ────────────────────────────────────────────────────────
sendgrid.api.key=${SENDGRID_API_KEY}
sendgrid.from.email=${SENDGRID_FROM_EMAIL}

# ─── Moderation pipeline (Kafka) ─────────────────────────────────────────────
# Producer: acks=all + idempotence — an acked moderation request is never silently
# lost or duplicated by the producer. Consumer: manual-ish commit per record, after
# the verdict has been applied (at-least-once; application is idempotent).
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.producer.acks=all
spring.kafka.producer.properties.enable.idempotence=true
spring.kafka.consumer.group-id=backend-moderation
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.enable-auto-commit=false
spring.kafka.listener.ack-mode=record

moderation.topics.requests=moderation.requests
moderation.topics.verdicts=moderation.verdicts
moderation.topics.dlq=moderation.requests.dlq
# MOD-02: verdicts that repeatedly fail to apply (e.g. a datastore blip) land here instead
# of being silently dropped after the retry budget — separate from the requests DLQ above,
# which is the worker's poison-message queue for malformed requests.
moderation.topics.verdicts-dlq=moderation.verdicts.dlq
moderation.topics.partitions=12
moderation.outbox.batch-size=100
moderation.outbox.relay-delay-ms=1000
moderation.outbox.relay-initial-delay-ms=1000

# MOD-01 reconciliation sweep: re-enqueues content stuck PENDING (verdict never arrived).
moderation.sweep.stuck-after-minutes=10
moderation.sweep.batch-size=100
moderation.sweep.interval-ms=60000
moderation.sweep.initial-delay-ms=60000

# ─── Auth ─────────────────────────────────────────────────────────────────────
# RS256 keypair (base64 DER, or full PEM — both accepted). The PUBLIC key is what
# the gateway needs to verify tokens; the PRIVATE key never leaves this backend.
# Generate with:  openssl genpkey -algorithm RSA -pkeyopt rsa_keygen_bits:2048 -out priv.pem
#                 openssl rsa -pubout -in priv.pem -out pub.pem
#                 (strip the PEM header/footer + newlines for the env var)
jwt.private-key=${JWT_PRIVATE_KEY}
jwt.public-key=${JWT_PUBLIC_KEY}
# Access token: short-lived, verified by signature only. Refresh token: long-lived,
# opaque, tracked in the Postgres refresh_tokens table. Defaults: 15 min / 7 days.
jwt.access-token-expiration-ms=${JWT_ACCESS_TOKEN_EXP_MS:900000}
jwt.refresh-token-expiration-ms=${JWT_REFRESH_TOKEN_EXP_MS:604800000}

# Refresh-token cookie. Defaults here are SameSite=None + Secure (safe for a backend
# reached cross-origin); the Compose deployment overrides to SameSite=Lax + non-Secure
# because the gateway unifies everything to one origin (AUTH_COOKIE_* in compose.yaml).
app.cookie.secure=${AUTH_COOKIE_SECURE:true}
app.cookie.same-site=${AUTH_COOKIE_SAME_SITE:None}

# ─── Google OAuth2 ────────────────────────────────────────────────────────────
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=profile,email
# BASE_URL = public URL of the backend (e.g. https://api.cinemate.example.com)
spring.security.oauth2.client.registration.google.redirect-uri=${BASE_URL}/login/oauth2/code/{registrationId}

# Watch-party is a self-owning microservice reached directly through the gateway
# (Stage 1) — the backend no longer calls it, so it needs no watch-party config here.

# ─── Frontend / CORS ──────────────────────────────────────────────────────────
# Public URL of the frontend — used for the Google OAuth redirect target.
# Used only for the post-OAuth redirect back to the SPA (now the gateway origin).
app.frontend.url=${FRONTEND_URL:http://localhost:8080}

# NOTE: the backend no longer does CORS — it's internal-only behind the gateway,
# which owns the single browser-facing origin. (CORS_ALLOWED_ORIGINS still exists at
# the compose level, but only for the watch-party WebSocket origin check.)

# ─── Profile ──────────────────────────────────────────────────────────────────
# Override with SPRING_PROFILES_ACTIVE env var in production (set to 'prod').
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}
